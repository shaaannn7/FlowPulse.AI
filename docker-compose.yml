version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=sqlite:///./data/flowpulse.db
      - YOLO_MODEL_PATH=weights/yolo11n.pt
      - CORS_ORIGINS=["http://localhost", "http://localhost:5173"]
    volumes:
      - backend-data:/app/data
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend-data:
